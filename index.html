<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SR india - AI Trading Desk</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --panel-bg: #1a1a1a;
            --neon-blue: #00e5ff;
            --text-color: #e0e0e0;
            --alert-color: #ff0055;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #app-container {
            width: 100%;
            max-width: 650px;
            height: 95vh;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Settings Panel for API Key and Model */
        #settings-panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--neon-blue);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.1);
        }

        .setting-item {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-grow: 1;
        }

        #settings-panel input, #settings-panel select {
            flex-grow: 1;
            padding: 8px 12px;
            background-color: #0d0d0d;
            border: 1px solid #333;
            color: var(--neon-blue);
            border-radius: 5px;
            font-family: inherit;
            outline: none;
        }

        #settings-panel input:focus, #settings-panel select:focus {
            border-color: var(--neon-blue);
        }

        /* Chat Container */
        #chat-container {
            flex-grow: 1;
            background-color: var(--panel-bg);
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
            display: flex;
            flex-direction: column;
            border-radius: 8px;
            overflow: hidden;
        }

        #header {
            background-color: #000;
            color: var(--neon-blue);
            padding: 15px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            border-bottom: 1px solid var(--neon-blue);
            text-shadow: 0 0 5px var(--neon-blue);
            letter-spacing: 2px;
        }

        #chat-box {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 85%;
            padding: 12px 15px;
            border-radius: 5px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .user-message {
            background-color: rgba(0, 229, 255, 0.1);
            border-left: 3px solid var(--neon-blue);
            align-self: flex-end;
            text-align: right;
        }

        .ai-message {
            background-color: #2a2a2a;
            border-right: 3px solid var(--alert-color);
            align-self: flex-start;
        }

        .chat-image {
            max-width: 100%;
            border-radius: 5px;
            margin-top: 10px;
            border: 1px solid var(--neon-blue);
        }

        #input-area {
            display: flex;
            padding: 15px;
            background-color: #000;
            border-top: 1px solid var(--neon-blue);
            gap: 10px;
        }

        #input-area input[type="text"] {
            flex-grow: 1;
            padding: 10px;
            background-color: #1a1a1a;
            border: 1px solid #333;
            color: var(--text-color);
            border-radius: 5px;
            outline: none;
            font-family: inherit;
        }

        #input-area input[type="text"]:focus {
            border-color: var(--neon-blue);
        }

        .file-upload-label {
            background-color: #1a1a1a;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .file-upload-label:hover {
            background-color: var(--neon-blue);
            color: #000;
        }

        input[type="file"] {
            display: none;
        }

        button {
            padding: 10px 20px;
            background-color: var(--neon-blue);
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
            transition: 0.3s;
        }

        button:hover {
            box-shadow: 0 0 10px var(--neon-blue);
            background-color: #fff;
        }

        .loading {
            font-style: italic;
            color: #888;
            align-self: flex-start;
        }

        .error-text {
            color: var(--alert-color);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="settings-panel">
            <div class="setting-item">
                <strong>🔑 API Key:</strong>
                <input type="password" id="api-key-input" placeholder="Paste API Key...">
            </div>
            <div class="setting-item">
                <strong>🧠 Model:</strong>
                <select id="model-select">
                    <option value="gemini-1.5-flash-latest">Gemini 1.5 Flash Latest (Recommended)</option>
                    <option value="gemini-1.5-pro-latest">Gemini 1.5 Pro (Best for Charts)</option>
                    <option value="gemini-pro-vision">Gemini Pro Vision (Legacy)</option>
                </select>
            </div>
        </div>

        <div id="chat-container">
            <div id="header">SR india - AI Trading Desk</div>
            <div id="chat-box">
                <div class="message ai-message">System Active. API Key daalein aur Model select karein. Agar ek model error de, toh doosra try karein.</div>
            </div>
            <div id="input-area">
                <label for="image-input" class="file-upload-label" title="Upload Chart Screenshot">📁</label>
                <input type="file" id="image-input" accept="image/*">
                <input type="text" id="text-input" placeholder="Analyze this trend..." onkeypress="handleEnter(event)">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const textInput = document.getElementById('text-input');
        const imageInput = document.getElementById('image-input');
        const apiKeyInput = document.getElementById('api-key-input');
        const modelSelect = document.getElementById('model-select');

        function handleEnter(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        async function sendMessage() {
            const apiKey = apiKeyInput.value.trim();
            const selectedModel = modelSelect.value;
            const text = textInput.value.trim();
            const file = imageInput.files[0];

            if (!apiKey) {
                displayMessage("<span class='error-text'>Access Denied: Kripya pehle upar apna API key daalein.</span>", 'ai');
                return;
            }

            if (!text && !file) return;

            // API URL dynamically formatted with selected model and key
            const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${apiKey}`;

            // Display User Message
            displayMessage(text, 'user', file);
            textInput.value = '';
            imageInput.value = ''; 

            // Show Loading
            const loadingId = 'loading-' + Date.now();
            const loadingHtml = `<div class="message loading" id="${loadingId}">Analyzing Data via ${selectedModel}...</div>`;
            chatBox.insertAdjacentHTML('beforeend', loadingHtml);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                let requestBody = {
                    contents: [{
                        parts: []
                    }]
                };

                // Add text to prompt
                if (text) {
                    requestBody.contents[0].parts.push({ text: text + " (Analyze this from a trading/market perspective)" });
                } else if (file) {
                    requestBody.contents[0].parts.push({ text: "Act as an expert trader. Analyze this chart screenshot and explain the trends, support/resistance, and market behavior." });
                }

                // Add image to prompt
                if (file) {
                    const base64Image = await convertToBase64(file);
                    const base64Data = base64Image.split(',')[1]; 
                    
                    requestBody.contents[0].parts.push({
                        inline_data: {
                            mime_type: file.type,
                            data: base64Data
                        }
                    });
                }

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestBody)
                });

                const data = await response.json();
                document.getElementById(loadingId).remove();

                if (data.error) {
                    displayMessage(`<span class='error-text'>API Error: ${data.error.message} <br><br>Tip: Try selecting a different model from the top dropdown.</span>`, 'ai');
                } else {
                    const aiResponseText = data.candidates[0].content.parts[0].text;
                    displayMessage(aiResponseText, 'ai');
                }

            } catch (error) {
                document.getElementById(loadingId).remove();
                displayMessage("<span class='error-text'>Connection failed. Please check your internet connection and API key.</span>", 'ai');
            }
        }

        function displayMessage(text, sender, file = null) {
            const div = document.createElement('div');
            div.classList.add('message', sender === 'user' ? 'user-message' : 'ai-message');
            
            let formattedText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            formattedText = formattedText.replace(/\n/g, '<br>');

            let content = text ? formattedText : '';

            if (file) {
                const imgURL = URL.createObjectURL(file);
                content += `<br><img src="${imgURL}" class="chat-image" alt="Uploaded Chart">`;
            }

            div.innerHTML = content;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function convertToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }
    </script>
</body>
</html>
