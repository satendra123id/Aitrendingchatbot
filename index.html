<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SR india - Auto-Detect AI Trading Desk</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --panel-bg: #1a1a1a;
            --neon-blue: #00e5ff;
            --text-color: #e0e0e0;
            --alert-color: #ff0055;
            --success-color: #00ffcc;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #app-container {
            width: 100%;
            max-width: 650px;
            height: 95vh;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Setup Panel */
        #setup-panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--neon-blue);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.1);
        }

        .input-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #setup-panel input, #setup-panel select {
            flex-grow: 1;
            padding: 10px;
            background-color: #0d0d0d;
            border: 1px solid #333;
            color: var(--success-color);
            border-radius: 5px;
            font-family: inherit;
            outline: none;
        }

        #setup-panel input:focus, #setup-panel select:focus {
            border-color: var(--success-color);
        }

        button {
            padding: 10px 20px;
            background-color: var(--neon-blue);
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover {
            box-shadow: 0 0 15px var(--neon-blue);
            background-color: #fff;
        }

        button:disabled {
            background-color: #555;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Chat Container */
        #chat-container {
            flex-grow: 1;
            background-color: var(--panel-bg);
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
            display: flex;
            flex-direction: column;
            border-radius: 8px;
            overflow: hidden;
        }

        #header {
            background-color: #000;
            color: var(--neon-blue);
            padding: 15px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            border-bottom: 1px solid var(--neon-blue);
            text-shadow: 0 0 8px var(--neon-blue);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #chat-box {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 85%;
            padding: 12px 15px;
            border-radius: 5px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .user-message {
            background-color: rgba(0, 229, 255, 0.1);
            border-left: 3px solid var(--neon-blue);
            align-self: flex-end;
            text-align: right;
        }

        .ai-message {
            background-color: #2a2a2a;
            border-right: 3px solid var(--success-color);
            align-self: flex-start;
        }

        .chat-image {
            max-width: 100%;
            border-radius: 5px;
            margin-top: 10px;
            border: 1px solid var(--neon-blue);
        }

        #input-area {
            display: flex;
            padding: 15px;
            background-color: #000;
            border-top: 1px solid var(--neon-blue);
            gap: 10px;
        }

        #input-area input[type="text"] {
            flex-grow: 1;
            padding: 10px;
            background-color: #1a1a1a;
            border: 1px solid #333;
            color: var(--text-color);
            border-radius: 5px;
            outline: none;
            font-family: inherit;
        }

        .file-upload-label {
            background-color: #1a1a1a;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        input[type="file"] {
            display: none;
        }

        .status-text {
            font-size: 0.9rem;
            color: var(--success-color);
            text-align: center;
            margin-top: 5px;
        }
        
        .error-text { color: var(--alert-color); font-weight: bold; }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="setup-panel">
            <div class="input-group">
                <strong>🔑 API Key:</strong>
                <input type="password" id="api-key-input" placeholder="Paste API Key here...">
                <button onclick="fetchAvailableModels()" id="connect-btn">Connect</button>
            </div>
            <div class="input-group" id="model-selector-group" style="display: none;">
                <strong>🧠 Model:</strong>
                <select id="model-select"></select>
            </div>
            <div id="connection-status" class="status-text">Not Connected</div>
        </div>

        <div id="chat-container">
            <div id="header">SR india - AI Trading Desk</div>
            <div id="chat-box">
                <div class="message ai-message">System Initialize ho raha hai... Sabse pehle apni API Key daalkar 'Connect' par click karein. Phir system automatically correct model dhund lega.</div>
            </div>
            <div id="input-area">
                <label for="image-input" class="file-upload-label" title="Upload Trading Chart">📁</label>
                <input type="file" id="image-input" accept="image/*">
                <input type="text" id="text-input" placeholder="Type query..." onkeypress="handleEnter(event)" disabled>
                <button id="send-btn" onclick="sendMessage()" disabled>Send</button>
            </div>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const textInput = document.getElementById('text-input');
        const imageInput = document.getElementById('image-input');
        const apiKeyInput = document.getElementById('api-key-input');
        const modelSelect = document.getElementById('model-select');
        const modelGroup = document.getElementById('model-selector-group');
        const statusText = document.getElementById('connection-status');
        const sendBtn = document.getElementById('send-btn');
        const connectBtn = document.getElementById('connect-btn');

        // Automatically Fetch Valid Models from Google
        async function fetchAvailableModels() {
            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) {
                statusText.innerHTML = "<span class='error-text'>Pehle API Key daalein!</span>";
                return;
            }

            statusText.innerText = "Connecting to Google Servers...";
            connectBtn.innerText = "Loading...";
            connectBtn.disabled = true;

            try {
                // Fetch list of models valid for this specific API key
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error.message);
                }

                // Filter only those models that support generateContent
                const validModels = data.models.filter(model => 
                    model.supportedGenerationMethods && 
                    model.supportedGenerationMethods.includes("generateContent")
                );

                if (validModels.length === 0) {
                    throw new Error("Aapki API key par koi bhi valid model nahi mila.");
                }

                // Populate Dropdown
                modelSelect.innerHTML = '';
                validModels.forEach(model => {
                    const option = document.createElement('option');
                    // model.name looks like "models/gemini-1.5-flash"
                    option.value = model.name; 
                    option.textContent = model.displayName || model.name;
                    modelSelect.appendChild(option);
                });

                // Show selector and enable inputs
                modelGroup.style.display = 'flex';
                textInput.disabled = false;
                sendBtn.disabled = false;
                statusText.innerHTML = "✅ Connected Successfully! Model selected automatically.";
                connectBtn.innerText = "Connected";
                
                displayMessage("Server Connected. Aapka Auto-Detected Model ready hai! Ab apna chart upload karein ya sawal poochein.", 'ai');

            } catch (error) {
                statusText.innerHTML = `<span class='error-text'>Connection Failed: ${error.message}</span>`;
                connectBtn.innerText = "Connect";
                connectBtn.disabled = false;
            }
        }

        function handleEnter(event) {
            if (event.key === 'Enter' && !textInput.disabled) {
                sendMessage();
            }
        }

        async function sendMessage() {
            const apiKey = apiKeyInput.value.trim();
            // This will exactly be what Google's list returned (e.g. "models/gemini-1.5-flash")
            const selectedModel = modelSelect.value; 
            const text = textInput.value.trim();
            const file = imageInput.files[0];

            if (!text && !file) return;

            // Notice we use ${selectedModel} which already contains "models/"
            const API_URL = `https://generativelanguage.googleapis.com/v1beta/${selectedModel}:generateContent?key=${apiKey}`;

            displayMessage(text, 'user', file);
            textInput.value = '';
            imageInput.value = ''; 

            const loadingId = 'loading-' + Date.now();
            chatBox.insertAdjacentHTML('beforeend', `<div class="message ai-message" id="${loadingId}" style="color: #888; font-style: italic;">Analyzing with ${selectedModel.replace('models/', '')}...</div>`);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                let requestBody = {
                    contents: [{ parts: [] }]
                };

                if (text) {
                    requestBody.contents[0].parts.push({ text: text });
                } else if (file) {
                    requestBody.contents[0].parts.push({ text: "Analyze this chart from a trading perspective." });
                }

                if (file) {
                    const base64Image = await convertToBase64(file);
                    const base64Data = base64Image.split(',')[1]; 
                    requestBody.contents[0].parts.push({
                        inline_data: { mime_type: file.type, data: base64Data }
                    });
                }

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });

                const data = await response.json();
                document.getElementById(loadingId).remove();

                if (data.error) {
                    displayMessage(`<span class='error-text'>API Error: ${data.error.message}</span>`, 'ai');
                } else {
                    const aiResponseText = data.candidates[0].content.parts[0].text;
                    displayMessage(aiResponseText, 'ai');
                }

            } catch (error) {
                document.getElementById(loadingId).remove();
                displayMessage("<span class='error-text'>Network Error. Try again.</span>", 'ai');
            }
        }

        function displayMessage(text, sender, file = null) {
            const div = document.createElement('div');
            div.classList.add('message', sender === 'user' ? 'user-message' : 'ai-message');
            
            let formattedText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            formattedText = formattedText.replace(/\*(.*?)\*/g, '<em>$1</em>');
            formattedText = formattedText.replace(/\n/g, '<br>');

            let content = text ? formattedText : '';

            if (file) {
                const imgURL = URL.createObjectURL(file);
                content += `<br><img src="${imgURL}" class="chat-image" alt="Uploaded Market Chart">`;
            }

            div.innerHTML = content;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function convertToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }
    </script>
</body>
</html>
